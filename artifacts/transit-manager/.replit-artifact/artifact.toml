kind = "web"
previewPath = "/"
title = "Transit Manager"
version = "1.0.0"
id = "artifacts/transit-manager"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19961

[services.development]
run = "pnpm --filter @workspace/transit-manager run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/transit-manager", "run", "build" ]
publicDir = "artifacts/transit-manager/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19961"
BASE_PATH = "/"
