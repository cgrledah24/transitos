openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Transit Manager API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: users
    description: User management
  - name: trips
    description: Trip/transit management
  - name: whatsapp
    description: WhatsApp Business API integration

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login with username and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users:
    get:
      operationId: listUsers
      tags: [users]
      summary: List all users (admin only)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
    post:
      operationId: createUser
      tags: [users]
      summary: Create a new user (admin only)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserRequest"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users/{id}:
    get:
      operationId: getUser
      tags: [users]
      summary: Get a user by ID
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateUser
      tags: [users]
      summary: Update a user (admin only)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserRequest"
      responses:
        "200":
          description: User updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
    delete:
      operationId: deleteUser
      tags: [users]
      summary: Delete a user (admin only)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /trips:
    get:
      operationId: listTrips
      tags: [trips]
      summary: List trips (admin sees all, driver sees own)
      security:
        - bearerAuth: []
      parameters:
        - name: year
          in: query
          schema:
            type: integer
        - name: month
          in: query
          schema:
            type: integer
        - name: driverId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of trips
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Trip"
    post:
      operationId: createTrip
      tags: [trips]
      summary: Create a new trip (admin only)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTripRequest"
      responses:
        "201":
          description: Trip created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Trip"

  /trips/{id}:
    get:
      operationId: getTrip
      tags: [trips]
      summary: Get a trip by ID
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Trip found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Trip"
    put:
      operationId: updateTrip
      tags: [trips]
      summary: Update a trip (admin only)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTripRequest"
      responses:
        "200":
          description: Trip updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Trip"
    delete:
      operationId: deleteTrip
      tags: [trips]
      summary: Delete a trip (admin only)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Trip deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /trips/stats:
    get:
      operationId: getTripStats
      tags: [trips]
      summary: Get trip statistics for dashboard
      security:
        - bearerAuth: []
      parameters:
        - name: year
          in: query
          schema:
            type: integer
        - name: month
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Trip statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TripStats"

  /whatsapp/config:
    get:
      operationId: getWhatsAppConfig
      tags: [whatsapp]
      summary: Get WhatsApp configuration (admin only)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: WhatsApp config
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WhatsAppConfig"
    put:
      operationId: updateWhatsAppConfig
      tags: [whatsapp]
      summary: Update WhatsApp configuration (admin only)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateWhatsAppConfigRequest"
      responses:
        "200":
          description: WhatsApp config updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WhatsAppConfig"

  /whatsapp/messages:
    get:
      operationId: listMessages
      tags: [whatsapp]
      summary: List WhatsApp messages
      security:
        - bearerAuth: []
      parameters:
        - name: contactPhone
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WhatsAppMessage"
    post:
      operationId: sendMessage
      tags: [whatsapp]
      summary: Send a WhatsApp message
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendMessageRequest"
      responses:
        "200":
          description: Message sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WhatsAppMessage"

  /whatsapp/webhook:
    post:
      operationId: webhookReceive
      tags: [whatsapp]
      summary: Receive WhatsApp webhook events
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "200":
          description: Webhook processed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
    get:
      operationId: webhookVerify
      tags: [whatsapp]
      summary: Verify WhatsApp webhook
      parameters:
        - name: hub.mode
          in: query
          schema:
            type: string
        - name: hub.challenge
          in: query
          schema:
            type: string
        - name: hub.verify_token
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Webhook verified
          content:
            text/plain:
              schema:
                type: string

  /whatsapp/contacts:
    get:
      operationId: listContacts
      tags: [whatsapp]
      summary: List WhatsApp contacts (unique phone numbers that have messaged)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of contacts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WhatsAppContact"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
      required:
        - error

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
      required:
        - success

    LoginRequest:
      type: object
      properties:
        username:
          type: string
        password:
          type: string
      required:
        - username
        - password

    LoginResponse:
      type: object
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/User"
      required:
        - token
        - user

    User:
      type: object
      properties:
        id:
          type: integer
        username:
          type: string
        fullName:
          type: string
        role:
          type: string
          enum: [admin, driver]
        phone:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - username
        - fullName
        - role
        - createdAt

    CreateUserRequest:
      type: object
      properties:
        username:
          type: string
        password:
          type: string
        fullName:
          type: string
        role:
          type: string
          enum: [admin, driver]
        phone:
          type: string
      required:
        - username
        - password
        - fullName
        - role

    UpdateUserRequest:
      type: object
      properties:
        fullName:
          type: string
        password:
          type: string
        phone:
          type: string
        role:
          type: string
          enum: [admin, driver]

    Trip:
      type: object
      properties:
        id:
          type: integer
        date:
          type: string
          format: date
        origin:
          type: string
        destination:
          type: string
        driverId:
          type: integer
        driverName:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
        amount:
          type: number
          format: float
          nullable: true
        status:
          type: string
          enum: [scheduled, in_progress, completed, cancelled]
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - date
        - origin
        - destination
        - driverId
        - status
        - createdAt

    CreateTripRequest:
      type: object
      properties:
        date:
          type: string
          format: date
        origin:
          type: string
        destination:
          type: string
        driverId:
          type: integer
        notes:
          type: string
        amount:
          type: number
          format: float
        status:
          type: string
          enum: [scheduled, in_progress, completed, cancelled]
      required:
        - date
        - origin
        - destination
        - driverId

    UpdateTripRequest:
      type: object
      properties:
        date:
          type: string
          format: date
        origin:
          type: string
        destination:
          type: string
        driverId:
          type: integer
        notes:
          type: string
        amount:
          type: number
          format: float
        status:
          type: string
          enum: [scheduled, in_progress, completed, cancelled]

    TripStats:
      type: object
      properties:
        totalTrips:
          type: integer
        totalRevenue:
          type: number
        completedTrips:
          type: integer
        scheduledTrips:
          type: integer
        byDriver:
          type: array
          items:
            type: object
            properties:
              driverId:
                type: integer
              driverName:
                type: string
              tripCount:
                type: integer
              totalAmount:
                type: number
            required:
              - driverId
              - driverName
              - tripCount
              - totalAmount
        byMonth:
          type: array
          items:
            type: object
            properties:
              month:
                type: string
              tripCount:
                type: integer
              totalAmount:
                type: number
            required:
              - month
              - tripCount
              - totalAmount
      required:
        - totalTrips
        - totalRevenue
        - completedTrips
        - scheduledTrips
        - byDriver
        - byMonth

    WhatsAppConfig:
      type: object
      properties:
        phoneNumberId:
          type: string
          nullable: true
        accessToken:
          type: string
          nullable: true
        verifyToken:
          type: string
          nullable: true
        businessAccountId:
          type: string
          nullable: true
        isConfigured:
          type: boolean
      required:
        - isConfigured

    UpdateWhatsAppConfigRequest:
      type: object
      properties:
        phoneNumberId:
          type: string
        accessToken:
          type: string
        verifyToken:
          type: string
        businessAccountId:
          type: string

    WhatsAppMessage:
      type: object
      properties:
        id:
          type: integer
        messageId:
          type: string
          nullable: true
        contactPhone:
          type: string
        contactName:
          type: string
          nullable: true
        body:
          type: string
        direction:
          type: string
          enum: [inbound, outbound]
        status:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - contactPhone
        - body
        - direction
        - createdAt

    SendMessageRequest:
      type: object
      properties:
        to:
          type: string
        message:
          type: string
      required:
        - to
        - message

    WhatsAppContact:
      type: object
      properties:
        phone:
          type: string
        name:
          type: string
          nullable: true
        lastMessage:
          type: string
          nullable: true
        lastMessageAt:
          type: string
          format: date-time
          nullable: true
        unreadCount:
          type: integer
      required:
        - phone
        - unreadCount
